<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀴즈 RPG — 프로젝터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/games.css">
</head>
<body class="display-body">

<!-- ── Background canvas ── -->
<canvas id="rpg-canvas"></canvas>
<div class="scanlines"></div>

<!-- ════════════════ SCENE: IDLE ════════════════ -->
<div class="scene active" id="scene-idle">
  <div class="idle-logo">⚔️</div>
  <div class="idle-title">초등 교실 퀴즈 RPG</div>
  <div class="idle-sub">선생님이 캠페인을 시작할 때까지 기다려주세요</div>
</div>

<!-- ════════════════ SCENE: WORLD MAP ════════════════ -->
<div class="scene" id="scene-map">
  <div class="map-title" id="map-title">🗺️ 캠페인 지도</div>
  <div class="map-path" id="map-path"></div>
  <div class="map-teams" id="map-teams"></div>
</div>

<!-- ════════════════ SCENE: BATTLE (normal + boss + final) ════════════════ -->
<div class="scene" id="scene-battle">
  <div class="battle-layout">
    <!-- Left: Team panels -->
    <div class="battle-teams" id="battle-teams">
      <div class="battle-phase-tag" id="battle-phase-tag">전투 중</div>
    </div>

    <!-- Center: Monster + Question -->
    <div class="battle-center" id="battle-center">
      <!-- Stage info top -->
      <div style="text-align:center;font-size:.72rem;letter-spacing:.18em;color:rgba(255,255,255,.35);text-transform:uppercase" id="battle-stage-tag">던전 1</div>

      <!-- Monster -->
      <div class="monster-area">
        <span class="monster-emoji" id="monster-emoji">🐉</span>
        <div class="monster-name" id="monster-name" style="color:#F87171">드래곤</div>
        <div class="monster-hp-wrap">
          <div class="monster-hp-bg">
            <div class="monster-hp-fill" id="monster-hp-fill" style="width:100%"></div>
          </div>
          <div class="monster-hp-text" id="monster-hp-text">100/100</div>
        </div>
      </div>

      <!-- Question card -->
      <div class="rpg-q-card" id="rpg-q-card">
        <div class="rpg-q-num" id="rpg-q-num">문제 1/4</div>
        <div class="rpg-q-text" id="rpg-q-text">문제 내용이 여기에 표시됩니다.</div>
        <div class="rpg-opts" id="rpg-opts"></div>
        <div class="rpg-explain hidden" id="rpg-explain"></div>
      </div>

      <!-- Floating numbers layer -->
      <div id="floaters" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
    </div>

    <!-- Right: Skills + Unit info -->
    <div class="battle-sidebar">
      <div class="sidebar-stage">
        단원<strong id="sidebar-unit-name">—</strong>
      </div>
      <div style="margin-top:auto">
        <div class="skills-section-title">스킬</div>
        <div id="display-skills"></div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════ SCENE: CHECKPOINT ════════════════ -->
<div class="scene" id="scene-checkpoint">
  <div class="camp-fire">🔥</div>
  <div class="checkpoint-title" id="ckpt-title">체크포인트 🏕️</div>
  <div class="checkpoint-unit" id="ckpt-unit"></div>
  <div class="checkpoint-teams" id="ckpt-teams"></div>
  <div class="checkpoint-next">▷ 선생님이 다음 단계를 진행합니다…</div>
</div>

<!-- ════════════════ SCENE: VICTORY ════════════════ -->
<div class="scene" id="scene-victory">
  <div class="victory-title">🎉 캠페인 클리어! 🎉</div>
  <div class="podium-row" id="podium-row"></div>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/rpg.js"></script>
<script src="assets/js/display.js"></script>
</body>
</html>
