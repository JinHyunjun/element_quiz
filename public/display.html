<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#102f2c">
  <title>모두의 탐험대 | 학생 화면</title>
  <link rel="stylesheet" href="assets/css/games.css">
</head>
<body>
  <main class="display-stage">
    <section class="display-scene active" id="display-idle">
      <div class="idle-symbol" aria-hidden="true">✦</div>
      <p>모두의 탐험대</p>
      <h1>오늘의 수업을<br>준비하고 있어요.</h1>
      <span>선생님 화면에서 수업을 시작해 주세요.</span>
    </section>

    <section class="display-scene" id="display-question">
      <header class="display-header">
        <div><span class="display-brand">모두의 탐험대</span><strong id="display-class-name">우리 반 탐험 수업</strong></div>
        <div class="display-progress"><span id="display-meta">수업 주제</span><strong id="display-question-number">1 / 6</strong></div>
      </header>

      <div class="display-content">
        <div class="display-question-card">
          <div class="display-question-top"><span id="display-kind">생각 열기</span><div class="display-timer" id="display-timer">생각 중</div></div>
          <h1 id="display-question-text">문제를 준비하고 있어요.</h1>
          <div class="display-options" id="display-options"></div>
          <div class="display-explanation hidden" id="display-explanation"></div>
        </div>

        <aside class="display-aside">
          <div class="display-picker">
            <span>오늘의 발표자</span>
            <strong id="display-picked">잠시 후 만나요</strong>
            <small>생각할 시간을 충분히 줄게요.</small>
          </div>
          <div class="display-team-list" id="display-team-list"></div>
          <div class="display-coverage">
            <span>한 번 이상 참여한 친구</span><strong id="display-coverage-copy">0 / 0명</strong>
            <div><i id="display-coverage-bar"></i></div>
          </div>
        </aside>
      </div>
    </section>

    <section class="display-scene" id="display-summary">
      <div class="summary-burst" aria-hidden="true">✦</div>
      <p>오늘의 탐험 완료</p>
      <h1 id="display-summary-title">모두가 한 걸음 내디뎠어요!</h1>
      <div class="display-summary-stats" id="display-summary-stats"></div>
      <span>정답뿐 아니라 용기 내어 도전한 모든 순간이 별이 되었어요.</span>
    </section>
  </main>

  <script src="assets/js/state.js"></script>
  <script src="assets/js/display.js"></script>
</body>
</html>
